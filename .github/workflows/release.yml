name: release

on:
  push:
    branches: [main]

# Serialize releases: two quick merges must not both try to publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Determine version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
      - name: Check whether this version is already on npm
        id: published
        run: |
          if npm view "@zomglings/rath@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm (trusted publishing)
        if: steps.published.outputs.published == 'false'
        run: npm publish
      - name: Tag and cut GitHub release
        if: steps.published.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
